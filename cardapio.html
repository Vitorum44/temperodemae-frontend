<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Aparência</title>

    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='70' x='18' font-size='80'%3E🎨%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./admin.css" />

    <link rel="stylesheet" href="./cardapio.css" />
</head>

<body class="admin-page">

    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-icon">🍔</span>
            <span class="sidebar-brand-name">Tempero de Mãe</span>
            <button class="sidebar-close-btn" id="sidebar-close-btn">
                <span class="material-icons-outlined" style="font-size:20px;">close</span>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="admin.html" class="sidebar-link">
                <span class="material-icons-outlined">receipt_long</span>
                <span>Pedidos</span>
            </a>
            <a href="estoque.html" class="sidebar-link">
                <span class="material-icons-outlined">inventory_2</span>
                <span>Estoque</span>
            </a>
            <a href="cardapio.html" class="sidebar-link active">
                <span class="material-icons-outlined">restaurant_menu</span>
                <span>Cardápio</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()" class="sidebar-logout-btn">
                <span class="material-icons-outlined" style="font-size:18px;">logout</span>
                Sair
            </button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="admin-topbar">
        <button class="topbar-menu-btn" id="topbar-menu-btn">
            <span class="material-icons-outlined">menu</span>
        </button>
        <div class="topbar-title">🎨 Aparência</div>
        <div style="width:40px;"></div>
    </div>

    <div class="main-content" style="margin-left:260px;">
        <div class="config-grid">

            <div class="edit-panel">
                <h2>Personalizar Loja</h2>
                <p class="subtitle">Edite as cores e veja o resultado no celular ao lado.</p>

                <form id="appearance-form">
                    <div class="edit-section">
                        <h3>Cores da Marca</h3>

                        <div class="form-group">
                            <label>Cabeçalho</label>
                            <div class="color-wrapper" style="display:flex; gap:10px;">
                                <input type="color" id="input-header-bg" value="#0F172A"
                                    style="width:50px; height:40px; cursor:pointer;">
                                <input type="text" id="text-header-bg" value="#0F172A" maxlength="7"
                                    style="flex:1; text-transform:uppercase;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Cor Principal</label>
                            <div class="color-wrapper" style="display:flex; gap:10px;">
                                <input type="color" id="input-primary-color" value="#3B82F6"
                                    style="width:50px; height:40px; cursor:pointer;">
                                <input type="text" id="text-primary-color" value="#3B82F6" maxlength="7"
                                    style="flex:1; text-transform:uppercase;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Fundo da Página</label>
                            <div class="color-wrapper" style="display:flex; gap:10px;">
                                <input type="color" id="input-body-bg" value="#F3F4F6"
                                    style="width:50px; height:40px; cursor:pointer;">
                                <input type="text" id="text-body-bg" value="#F3F4F6" maxlength="7"
                                    style="flex:1; text-transform:uppercase;">
                            </div>
                        </div>
                    </div>

                    <div class="edit-section">
                        <h3>Logotipo</h3>
                        <div class="form-group">
                            <label>Imagem da Logo</label>
                            <div class="logo-input-wrapper">
                                <img id="logo-preview-small" src="" alt="Sem logo" class="logo-thumb">

                                <div style="flex: 1;">
                                    <input type="file" id="file-logo" accept="image/*"
                                        style="width:100%; margin-bottom:5px;">

                                    <input type="text" id="input-logo" readonly
                                        placeholder="O link aparecerá aqui após upload..." class="input-text"
                                        style="background:#f3f4f6; color:#666; font-size:11px;">

                                    <small id="loading-logo"
                                        style="color:#3b82f6; font-weight:bold; display:none;">Carregando
                                        imagem...</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="edit-section">
                        <h3>Banners</h3>
                        <div class="form-group">
                            <label>Adicionar Novo Banner</label>
                            <div style="display:flex; gap:10px; align-items:flex-start;">
                                <div style="flex:1">
                                    <input type="file" id="file-banner" accept="image/*" style="width:100%;">
                                    <small id="loading-banner"
                                        style="color:#3b82f6; font-weight:bold; display:none;">Enviando
                                        banner...</small>
                                </div>
                            </div>
                        </div>

                        <div id="banners-list-container"></div>
                    </div>

                    <button type="submit" class="btn-save-fixed">SALVAR TUDO</button>
                </form>
            </div>

            <div class="preview-side">
                <div class="phone-mockup">
                    <div class="phone-notch"></div>
                    <div class="phone-screen">
                        <iframe id="preview-iframe" src="index.html"></iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast-container"></div>


    <script>
        function logout() {
      localStorage.removeItem('token');
      window.location.href = 'admin.html';
    }

    const sidebar = document.getElementById('admin-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('topbar-menu-btn');
    const closeBtn = document.getElementById('sidebar-close-btn');

    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

    menuBtn?.addEventListener('click', openSidebar);
    closeBtn?.addEventListener('click', closeSidebar);
    overlay?.addEventListener('click', closeSidebar);
    </script>

    <script type="module" src="./js/cardapio.js"></script>
</body>

</html>

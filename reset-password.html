<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Redefinir senha</title>

<style>

body{
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#f4f4f4;
}

.card{
background:#fff;
padding:40px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
background:#d62300;
color:#fff;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Nova senha</h2>

<input
type="password"
id="newpass"
placeholder="Digite sua nova senha"
/>

<button onclick="resetPass()">
Salvar nova senha
</button>

</div>

<script>

async function resetPass(){

const params = new URLSearchParams(window.location.search)

const token = params.get("token")

const password = document.getElementById("newpass").value

await fetch("https://api-temperodemae.onrender.com/auth/reset-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token,
password
})

})

alert("Senha alterada!")

window.location.href="/"

}

</script>

</body>
</html>
